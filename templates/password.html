{% extends "base.html" %}
{% block title %}Password Checker{% endblock %}
{% block content %}
<h1 class="text-3xl font-bold mb-8 text-neon-cyan">Password Strength Checker</h1>
<div class="max-w-xl">
    <form id="password-form" class="bg-cyber-panel border border-cyber-border rounded-xl p-6">
        <label class="block text-sm text-gray-400 mb-2">Enter Password</label>
        <input type="password" name="password" id="password-input" required
            class="w-full bg-cyber-dark border border-cyber-border rounded-lg px-4 py-3 text-gray-100 focus:border-neon-cyan focus:outline-none transition"
            placeholder="Type your password...">
        <button type="submit" class="mt-4 bg-neon-cyan text-cyber-dark font-bold px-6 py-3 rounded-lg hover:bg-neon-cyan/80 transition w-full">Analyze</button>
    </form>
    <div id="result" class="mt-6 hidden">
        <div class="bg-cyber-panel border border-cyber-border rounded-xl p-6">
            <h3 class="text-lg font-bold mb-4">Results</h3>
            <div id="result-content"></div>
        </div>
    </div>
</div>
{% endblock %}
